name: Gemini API Key Test

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  test-key:
    runs-on: ubuntu-latest
    steps:
      - name: List Available Models
        env:
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          curl "https://generativelanguage.googleapis.com/v1beta/models?key=${GEMINI_API_KEY}"

      - name: Gemini Connection Test
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
        with:
          # Using a confirmed available model from the diagnostic list
          gemini_model: 'gemini-2.0-flash'
          gemini_api_key: ${{ secrets.GOOGLE_API_KEY }}
          prompt: "Please respond with 'API Key is working correctly' if you can read this."

      - name: Verify Output
        run: |
          echo "Gemini responded with:"
          echo "${{ steps.gemini.outputs.summary }}"
